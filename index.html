<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shizuoka Drift</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/playroomkit/multiplayer.full.umd.js"></script>
</head>
<body>
    <div id="lobby-ui">
        <h1>SHIZUOKA DRIFT</h1>
        <p>Waiting for players...</p>
    </div>

    <div id="winner-ui">
        <h1 id="winner-text">WINNER!</h1>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

   <div id="game-ui">
        <div id="speed-meter">SPEED: 0 km/h</div>
        <div id="distance-meter">GOAL: 0m</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
